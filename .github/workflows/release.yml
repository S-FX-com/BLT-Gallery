name: Release

# Builds a clean plugin zip and publishes it as a GitHub Release asset
# whenever a version tag is pushed. plugin-update-checker (wired up in
# src/Core/Updater.php) then surfaces the new release to every install.
#
# Cutting a release:
#   1. Bump `Version:` in blt-gallery.php and the BLT_GALLERY_VERSION constant
#      (they must match).
#   2. Commit, then tag: `git tag v3.2.1 && git push origin v3.2.1`
#   3. This workflow runs, sanity-checks the tag against the header, builds
#      blt-gallery-<version>.zip, and creates the GitHub Release with the
#      zip attached.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches plugin header + constant
        run: |
          set -euo pipefail
          HEADER_VERSION="$(grep -E '^\s*\*\s*Version:' blt-gallery.php | head -1 | awk '{print $NF}')"
          CONST_VERSION="$(grep -E "define\(\s*'BLT_GALLERY_VERSION'" blt-gallery.php | sed -E "s/.*'BLT_GALLERY_VERSION',[[:space:]]*'([^']+)'.*/\1/")"
          TAG_VERSION="${{ steps.version.outputs.version }}"
          echo "Tag version:      $TAG_VERSION"
          echo "Header version:   $HEADER_VERSION"
          echo "Constant version: $CONST_VERSION"
          if [ "$HEADER_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Plugin header Version ($HEADER_VERSION) does not match tag ($TAG_VERSION). Bump blt-gallery.php and re-tag."
            exit 1
          fi
          if [ "$CONST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::BLT_GALLERY_VERSION constant ($CONST_VERSION) does not match tag ($TAG_VERSION). Bump it in blt-gallery.php and re-tag."
            exit 1
          fi

      - name: Build clean release zip
        id: build
        run: |
          set -euo pipefail
          SLUG="blt-gallery"
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="/tmp/build/$SLUG"
          rm -rf /tmp/build
          mkdir -p "$STAGING"
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='.distignore' \
            --exclude='.editorconfig' \
            --exclude='tests/' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            --exclude='.vscode/' \
            --exclude='.idea/' \
            --exclude='*.log' \
            --exclude='*-report.html' \
            --exclude='phpcs.xml*' \
            --exclude='phpunit.xml*' \
            --exclude='composer.lock' \
            ./ "$STAGING/"
          ZIP="blt-gallery-${VERSION}.zip"
          (cd /tmp/build && zip -rq "$GITHUB_WORKSPACE/$ZIP" "$SLUG")
          ls -lh "$ZIP"
          unzip -l "$ZIP" | tail -20
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.build.outputs.zip }}
          fail_on_unmatched_files: true
