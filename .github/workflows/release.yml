name: Release

# Cuts a GitHub Release on every push to main. The version is read straight
# from blt-gallery.php (kept fresh by the Version bump workflow on each PR), a
# matching v<version> tag is created, a clean plugin zip is built, and the
# release is published with that zip attached. plugin-update-checker (wired up
# in src/Core/Updater.php) then surfaces the new release to every install.
#
# If the version in blt-gallery.php was already released (e.g. a direct push to
# main that didn't bump it), the patch is bumped automatically and committed
# back to main so a fresh release can always be cut.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version (bump + retag if already released)
        id: version
        run: |
          set -euo pipefail

          read_ver() {
            grep -E "define\(\s*'BLT_GALLERY_VERSION'" blt-gallery.php \
              | sed -E "s/.*'BLT_GALLERY_VERSION',[[:space:]]*'([^']+)'.*/\1/"
          }

          git fetch --tags --quiet
          VERSION="$(read_ver)"

          if git rev-parse -q --verify "refs/tags/v${VERSION}" >/dev/null; then
            echo "Tag v${VERSION} already exists; bumping patch to find a free version."
            IFS=. read -r MA MI PA <<< "$VERSION"
            PA=$((PA + 1))
            while git rev-parse -q --verify "refs/tags/v${MA}.${MI}.${PA}" >/dev/null; do
              PA=$((PA + 1))
            done
            VERSION="${MA}.${MI}.${PA}"
            echo "Bumping to ${VERSION} and committing back to main."

            sed -i -E "s/^(\s*\*\s*Version:\s*).*/\1${VERSION}/" blt-gallery.php
            sed -i -E "s/(define\(\s*'BLT_GALLERY_VERSION',\s*')[^']+('\s*\))/\1${VERSION}\2/" blt-gallery.php

            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "chore(release): bump version to ${VERSION}"
            git push origin HEAD:main
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}"    >> "$GITHUB_OUTPUT"

      - name: Verify plugin header + constant agree
        run: |
          set -euo pipefail
          HEADER_VERSION="$(grep -E '^\s*\*\s*Version:' blt-gallery.php | head -1 | awk '{print $NF}')"
          CONST_VERSION="$(grep -E "define\(\s*'BLT_GALLERY_VERSION'" blt-gallery.php | sed -E "s/.*'BLT_GALLERY_VERSION',[[:space:]]*'([^']+)'.*/\1/")"
          VERSION="${{ steps.version.outputs.version }}"
          echo "Release version: $VERSION"
          echo "Header version:  $HEADER_VERSION"
          echo "Constant version:$CONST_VERSION"
          if [ "$HEADER_VERSION" != "$VERSION" ] || [ "$CONST_VERSION" != "$VERSION" ]; then
            echo "::error::Version mismatch between header ($HEADER_VERSION), constant ($CONST_VERSION) and release ($VERSION)."
            exit 1
          fi

      - name: Create and push tag
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Build clean release zip
        id: build
        run: |
          set -euo pipefail
          SLUG="blt-gallery"
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="/tmp/build/$SLUG"
          rm -rf /tmp/build
          mkdir -p "$STAGING"
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='.distignore' \
            --exclude='.editorconfig' \
            --exclude='tests/' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            --exclude='.vscode/' \
            --exclude='.idea/' \
            --exclude='*.log' \
            --exclude='*-report.html' \
            --exclude='phpcs.xml*' \
            --exclude='phpunit.xml*' \
            --exclude='composer.lock' \
            ./ "$STAGING/"
          ZIP="blt-gallery-${VERSION}.zip"
          (cd /tmp/build && zip -rq "$GITHUB_WORKSPACE/$ZIP" "$SLUG")
          ls -lh "$ZIP"
          unzip -l "$ZIP" | tail -20
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.build.outputs.zip }}
          fail_on_unmatched_files: true
